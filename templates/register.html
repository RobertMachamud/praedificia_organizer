{% extends "base.html" %}
{% block content %}


<div class="login-cont flex-center">
    <div class="login">
        <form method="POST" action="{{ url_for('login') }}" class="flex-center reg">
            <h3></h3>
            <i class="bi bi-person-plus"></i>
             <!-- Username -->
             <div class="data-input">
                 <input id="username" name="username" type="text" required>
                 <div class="input-underline"></div>
                 <label for="username">BENUTZERNAME <i class="i-login bi bi-person"></i></label>
             </div>
             <!-- Name -->
            <div class="data-input">
                 <input id="name" name="name" type="text" required>
                 <div class="input-underline"></div>
                 <label for="name">NAME <i class="i-login bi bi-person"></i></label>
             </div>
             <!-- Password -->
             <div class="data-input">
                 <input id="password" name="password" type="password" required>
                 <div class="input-underline"></div>
                 <label for="password">PASSWORT <i class="i-login bi bi-key"></i></label>
             </div>
             <div class="data-input">
                 <input id="tel" name="tel" type="text" required>
                 <div class="input-underline"></div>
                 <label for="tel">TELEFON <i class="bi bi-telephone"></i></label>
             </div>
             <div class="data-input">
                 <input id="email" name="email" type="text" required>
                 <div class="input-underline"></div>
                 <label for="email">EMAIL <i class="bi bi-envelope-at"></i></label>
             </div>
            <div class="check-cont">
             <div class="form-check">
               <input class="form-check-input" type="radio" name="Bernd" id="radioDefault1">
               <label class="form-check-label" for="radioDefault1">
                 Bernd
               </label>
             </div>
             <div class="form-check">
               <input class="form-check-input" type="radio" name="None" id="radioDefault2" checked>
               <label class="form-check-label" for="radioDefault2">
                 None
               </label>
             </div>
            </div>
             <!-- Sign In BUTTON Container -->
             <div class="sign-btn-cont">
                 <button type="submit" class="btn btn-primary">Registrietren</button>
             </div>
     </form>
    </div>
</div>

{% endblock %}
